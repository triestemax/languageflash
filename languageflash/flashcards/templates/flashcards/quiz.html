{% extends 'flashcards/base.html' %}

{% block title %}Квиз — LanguageFlash{% endblock %}

{% block content %}
<h2>Квиз: угадай перевод</h2>

<div class="card mb-4">
    <div class="card-body text-center">
        {% if image %}
            <img src="{{ image.url }}" class="img-fluid mb-3 rounded" alt="{{ word }}">
        {% endif %}
        <h3>{{ word }}</h3>
    </div>
</div>

<form method="post">
    {% csrf_token %}
